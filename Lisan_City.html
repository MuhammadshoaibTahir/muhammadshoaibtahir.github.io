<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lisān City — 3D Pakistani Languages & Dialects Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #05080f;
    --panel-bg: rgba(5,8,18,0.94);
    --border: rgba(100,160,255,0.16);
    --accent: #4f8fff;
    --accent2: #ff6b6b;
    --gold: #f5c842;
    --teal: #3fffd2;
    --text: #ccd9f5;
    --text-dim: #5a6f96;
    --glow: rgba(79,143,255,0.4);
    --font-ui: 'Space Mono', monospace;
    --font-arabic: 'Amiri', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  canvas { display: block; }

  /* ═══ LOADING ══════════════════════════════════════════ */
  #loading {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    transition: opacity 1s ease, visibility 1s ease;
  }
  #loading.done { opacity: 0; visibility: hidden; pointer-events: none; }

  #load-title {
    font-family: var(--font-arabic);
    font-size: 3.4rem;
    background: linear-gradient(135deg, #a0c4ff 0%, var(--gold) 55%, #ff9ecd 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: loadPulse 2.2s ease-in-out infinite;
  }
  @keyframes loadPulse {
    0%,100%{ filter: brightness(1) drop-shadow(0 0 10px rgba(245,200,66,0.3)); }
    50%{ filter: brightness(1.5) drop-shadow(0 0 30px rgba(245,200,66,0.7)); }
  }
  #load-dev {
    font-size: 0.58rem; letter-spacing: 0.24em; color: rgba(245,200,66,0.6);
    text-transform: uppercase; animation: fadeSlideUp 1s ease 0.3s both;
  }
  #load-sub {
    font-size: 0.54rem; letter-spacing: 0.2em; color: var(--text-dim);
    text-transform: uppercase; animation: fadeSlideUp 1s ease 0.6s both;
  }
  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .load-bar-wrap {
    width: 240px; height: 1px; background: rgba(100,160,255,0.12);
    overflow: visible; position: relative;
    animation: fadeSlideUp 1s ease 0.9s both;
  }
  .load-bar-fill {
    height: 1px; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--teal), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 1.5s linear infinite;
    transition: width 0.35s ease;
    box-shadow: 0 0 14px var(--accent), 0 0 30px rgba(79,143,255,0.3);
  }
  @keyframes shimmer { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }
  .load-dot {
    position: absolute; right: 0; top: 50%;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal); transform: translate(50%,-50%);
    box-shadow: 0 0 10px var(--teal), 0 0 20px rgba(63,255,210,0.5);
    animation: dotPulse 0.7s ease-in-out infinite alternate;
    transition: left 0.35s ease;
    left: 0%;
  }
  @keyframes dotPulse { from{transform:translate(50%,-50%) scale(0.8);opacity:0.6} to{transform:translate(50%,-50%) scale(1.2);opacity:1} }

  /* ═══ PARTICLE CANVAS ══════════════════════════════════ */
  #particle-canvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  /* ═══ SCANLINES ════════════════════════════════════════ */
  #scanlines {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  }

  /* ═══ TOP BAR ══════════════════════════════════════════ */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: linear-gradient(to bottom, rgba(5,8,18,0.98) 0%, rgba(5,8,18,0.4) 75%, transparent 100%);
    pointer-events: none;
    animation: topbarReveal 0.9s cubic-bezier(0.16,1,0.3,1) 0.8s both;
  }
  @keyframes topbarReveal { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }

  #title-block { pointer-events: auto; }
  #title-block h1 {
    font-family: var(--font-arabic);
    font-size: 1.75rem; letter-spacing: 0.04em;
    background: linear-gradient(120deg, #a8ccff 0%, var(--gold) 65%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1;
    filter: drop-shadow(0 0 20px rgba(245,200,66,0.25));
  }
  .title-tagline {
    font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.22em;
    text-transform: uppercase; margin-top: 3px;
  }
  .title-dev {
    font-size: 0.46rem; color: rgba(245,200,66,0.5);
    letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px;
  }
  .title-dev span { color: rgba(245,200,66,0.8); }

  #mode-buttons { display: flex; gap: 7px; pointer-events: auto; }

  .mode-btn {
    background: rgba(8,14,35,0.9); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--font-ui); font-size: 0.56rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 16px; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(12px); position: relative; overflow: hidden;
  }
  .mode-btn::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transform: scaleX(0); transition: transform 0.3s;
  }
  .mode-btn:hover::after, .mode-btn.active::after { transform: scaleX(1); }
  .mode-btn:hover, .mode-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(79,143,255,0.08);
    box-shadow: 0 0 18px rgba(79,143,255,0.25), inset 0 0 18px rgba(79,143,255,0.04);
    transform: translateY(-2px);
  }
  .mode-btn:active { transform: translateY(0) scale(0.97); }

  /* ═══ SEARCH ═══════════════════════════════════════════ */
  #search-box {
    position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
    z-index: 150; display: flex; width: 310px;
    animation: topbarReveal 0.9s cubic-bezier(0.16,1,0.3,1) 1.05s both;
  }
  #search-input {
    flex: 1; background: rgba(5,8,18,0.95); border: 1px solid var(--border); border-right: none;
    color: var(--text); font-family: var(--font-ui); font-size: 0.61rem;
    padding: 9px 14px; outline: none; letter-spacing: 0.06em;
    backdrop-filter: blur(16px); transition: border-color 0.25s, box-shadow 0.25s;
  }
  #search-input::placeholder { color: var(--text-dim); }
  #search-input:focus { border-color: var(--accent); box-shadow: 0 0 22px rgba(79,143,255,0.12); }
  #search-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #2a6bdf 100%);
    border: 1px solid var(--accent); color: #fff;
    font-family: var(--font-ui); font-size: 0.56rem;
    padding: 0 18px; cursor: pointer; letter-spacing: 0.12em;
    transition: all 0.25s; white-space: nowrap;
  }
  #search-btn:hover { background: linear-gradient(135deg, #6fa8ff, var(--accent)); transform: scale(1.05); }

  /* ═══ INFO PANEL ════════════════════════════════════════ */
  #info-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 348px;
    background: var(--panel-bg); border-left: 1px solid var(--border);
    backdrop-filter: blur(22px); z-index: 200;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
  }
  #info-panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--teal) 70%, transparent 100%);
    animation: panelScan 4s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes panelScan { 0%{background-position:200% 0%} 100%{background-position:-200% 0%} }
  #info-panel.open { transform: translateX(0); }

  #panel-header {
    padding: 28px 22px 18px; border-bottom: 1px solid var(--border);
    position: relative;
    background: linear-gradient(180deg, rgba(79,143,255,0.07) 0%, transparent 100%);
  }
  #panel-close {
    position: absolute; top: 20px; right: 18px;
    background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25);
    color: var(--accent2); font-size: 0.7rem; cursor: pointer;
    font-family: var(--font-ui); width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
  }
  #panel-close:hover { background: rgba(255,107,107,0.2); transform: rotate(90deg) scale(1.1); box-shadow: 0 0 12px rgba(255,107,107,0.3); }

  #panel-type-badge {
    font-size: 0.47rem; letter-spacing: 0.22em; text-transform: uppercase;
    padding: 3px 10px; border: 1px solid; display: inline-block; margin-bottom: 12px;
  }
  #panel-type-badge.lang { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(79,143,255,0.2); }
  #panel-type-badge.dialect { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(245,200,66,0.2); }

  #panel-name { font-family: var(--font-arabic); font-size: 2rem; line-height: 1.1; }
  #panel-native { font-family: var(--font-arabic); font-size: 1.3rem; color: var(--gold); direction: rtl; margin-top: 5px; text-shadow: 0 0 20px rgba(245,200,66,0.3); }
  #panel-subtitle { font-size: 0.57rem; color: var(--text-dim); margin-top: 8px; letter-spacing: 0.1em; }

  #panel-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
  #panel-body::-webkit-scrollbar { width: 2px; }
  #panel-body::-webkit-scrollbar-thumb { background: var(--border); }

  .panel-section { margin-bottom: 22px; }

  .panel-section-title {
    font-size: 0.49rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); border-bottom: 1px solid var(--border);
    padding-bottom: 7px; margin-bottom: 11px;
  }

  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.6rem; padding: 5px 0;
    border-bottom: 1px solid rgba(100,160,255,0.05);
    transition: background 0.2s, padding-left 0.2s;
  }
  .stat-row:hover { background: rgba(79,143,255,0.05); padding-left: 4px; }
  .stat-row span:first-child { color: var(--text-dim); }
  .stat-row span:last-child { color: var(--text); font-weight: bold; }

  .status-pill {
    display: inline-block; font-size: 0.49rem;
    padding: 2px 10px; letter-spacing: 0.12em;
  }
  .status-safe { background: rgba(100,200,100,0.1); border: 1px solid #64c864; color: #64c864; }
  .status-vulnerable { background: rgba(255,200,50,0.1); border: 1px solid #ffc832; color: #ffc832; }
  .status-endangered { background: rgba(255,100,50,0.1); border: 1px solid #ff6432; color: #ff6432; }
  .status-critical { background: rgba(200,0,0,0.15); border: 1px solid #cc0000; color: #ff5555;
    animation: criticalBlink 1.8s ease-in-out infinite; }
  @keyframes criticalBlink { 0%,100%{box-shadow:0 0 4px rgba(255,0,0,0.2)} 50%{box-shadow:0 0 12px rgba(255,0,0,0.5)} }

  .phrase-block {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    padding: 9px 14px; margin-bottom: 7px; font-size: 0.6rem;
    position: relative; overflow: hidden; transition: all 0.22s;
  }
  .phrase-block::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
    background: linear-gradient(180deg, var(--accent), var(--teal));
  }
  .phrase-block:hover { background: rgba(79,143,255,0.05); border-color: rgba(79,143,255,0.28); transform: translateX(2px); }
  .phrase-roman { color: var(--text-dim); margin-bottom: 3px; }
  .phrase-script { font-family: var(--font-arabic); font-size: 1.05rem; direction: rtl; color: var(--gold); }

  .dialect-tag {
    display: inline-block; background: rgba(79,143,255,0.06);
    border: 1px solid rgba(79,143,255,0.22); color: var(--text);
    font-size: 0.52rem; padding: 4px 11px; margin: 3px;
    cursor: pointer; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: 0.06em;
  }
  .dialect-tag:hover {
    background: rgba(79,143,255,0.16); border-color: var(--accent);
    color: #fff; transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 16px rgba(79,143,255,0.22);
  }

  /* ═══ TOOLTIP ══════════════════════════════════════════ */
  #tooltip {
    position: fixed; background: rgba(4,7,16,0.97);
    border: 1px solid var(--border);
    backdrop-filter: blur(18px); padding: 12px 16px;
    pointer-events: none; z-index: 500; display: none;
    max-width: 215px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,143,255,0.06);
  }
  #tooltip::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--teal), transparent);
  }
  .tt-name { font-size: 0.74rem; color: var(--text); margin-bottom: 2px; font-weight: bold; }
  .tt-native { font-family: var(--font-arabic); font-size: 1rem; color: var(--gold); direction: rtl; }
  .tt-sub { font-size: 0.52rem; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.09em; line-height: 1.5; }

  /* ═══ LEGEND ═══════════════════════════════════════════ */
  #legend {
    position: fixed; left: 16px; bottom: 16px; z-index: 100;
    background: var(--panel-bg); border: 1px solid var(--border);
    backdrop-filter: blur(18px); padding: 16px 18px; width: 202px;
    animation: legendReveal 0.9s cubic-bezier(0.16,1,0.3,1) 1.4s both;
  }
  @keyframes legendReveal { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  #legend::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .legend-title { font-size: 0.49rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .legend-row {
    display: flex; align-items: center; gap: 9px;
    margin-bottom: 7px; cursor: pointer; transition: all 0.2s; padding: 2px 4px;
  }
  .legend-row:hover { transform: translateX(4px); }
  .legend-swatch { width: 10px; height: 10px; flex-shrink: 0; }
  .legend-label { color: var(--text); font-size: 0.57rem; flex: 1; }
  .legend-count { color: var(--text-dim); font-size: 0.54rem; }

  #dialect-toggle {
    margin-top: 12px; border-top: 1px solid var(--border);
    padding-top: 12px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer; transition: opacity 0.2s;
  }
  #dialect-toggle:hover { opacity: 0.78; }
  #dialect-toggle-label { font-size: 0.51rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
  .toggle-switch {
    width: 30px; height: 14px; background: rgba(79,143,255,0.12);
    border: 1px solid rgba(79,143,255,0.35); position: relative;
    transition: background 0.3s; cursor: pointer;
  }
  .toggle-switch.on { background: rgba(79,143,255,0.3); border-color: var(--accent); box-shadow: 0 0 8px rgba(79,143,255,0.3); }
  .toggle-knob {
    position: absolute; top: 2px; left: 2px; width: 8px; height: 8px;
    background: var(--text-dim); transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toggle-switch.on .toggle-knob { left: 18px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* ═══ CREDIT BADGE ════════════════════════════════════ */
  #credit-badge {
    position: fixed; left: 16px;
    z-index: 101;
    background: var(--panel-bg); border: 1px solid rgba(245,200,66,0.18);
    backdrop-filter: blur(18px); padding: 10px 15px;
    bottom: 248px;
    animation: legendReveal 0.9s cubic-bezier(0.16,1,0.3,1) 1.6s both;
  }
  #credit-badge::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .credit-by { font-size: 0.44rem; letter-spacing: 0.22em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
  .credit-name {
    font-family: var(--font-arabic); font-size: 0.88rem; color: var(--gold);
    letter-spacing: 0.03em;
    text-shadow: 0 0 22px rgba(245,200,66,0.35);
    animation: namePulse 3s ease-in-out infinite;
  }
  @keyframes namePulse {
    0%,100%{ text-shadow: 0 0 20px rgba(245,200,66,0.3); }
    50%{ text-shadow: 0 0 35px rgba(245,200,66,0.6), 0 0 60px rgba(245,200,66,0.2); }
  }

  /* ═══ COMPASS ════════════════════════════════════════ */
  #compass {
    position: fixed; right: 20px; bottom: 20px; z-index: 100;
    width: 54px; height: 54px;
    border: 1px solid var(--border); border-radius: 50%;
    background: rgba(5,8,18,0.94); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; font-size: 0.46rem; color: var(--text-dim);
    transition: right 0.5s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
    box-shadow: 0 0 0 1px rgba(79,143,255,0.08), inset 0 0 30px rgba(0,0,0,0.6);
    animation: compassAppear 0.9s cubic-bezier(0.16,1,0.3,1) 1.8s both;
  }
  @keyframes compassAppear { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
  #compass:hover { box-shadow: 0 0 0 1px var(--border), 0 0 24px rgba(79,143,255,0.2); }
  #compass.panel-open { right: 364px; }

  #compass-needle {
    width: 2px; height: 20px; display: flex; flex-direction: column;
    align-items: center; margin-bottom: 2px; transition: transform 0.2s ease;
  }
  .needle-n { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 11px solid var(--accent2); filter: drop-shadow(0 0 4px var(--accent2)); }
  .needle-s { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 11px solid var(--text-dim); opacity: 0.5; }

  @media (max-width: 620px) {
    #info-panel { width: 100%; }
    #search-box { width: 90%; }
    #legend, #credit-badge { display: none; }
  }
</style>
</head>
<body>

<div id="scanlines"></div>
<canvas id="particle-canvas"></canvas>

<!-- LOADING -->
<div id="loading">
  <div id="load-title">لسان سٹی</div>
  <div id="load-dev">Developed by Muhammad Shoaib Tahir</div>
  <div id="load-sub">Loading Pakistani Language Ecosystem</div>
  <div class="load-bar-wrap">
    <div class="load-bar-fill" id="load-fill"></div>
    <div class="load-dot" id="load-dot"></div>
  </div>
</div>

<div id="canvas-container"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="title-block">
    <h1>Lisān City</h1>
    <p class="title-tagline">3D Pakistani Languages &amp; Dialects Explorer</p>
    <p class="title-dev">by <span>Muhammad Shoaib Tahir</span></p>
  </div>
  <div id="mode-buttons">
    <button class="mode-btn active" data-mode="city">City</button>
    <button class="mode-btn" data-mode="family">Family</button>
    <button class="mode-btn" data-mode="dialect">Dialects</button>
    <button class="mode-btn" data-mode="status">Status</button>
  </div>
</div>

<!-- SEARCH -->
<div id="search-box">
  <input type="text" id="search-input" placeholder="Search language or dialect..."/>
  <button id="search-btn">GO</button>
</div>

<!-- INFO PANEL -->
<div id="info-panel">
  <div id="panel-header">
    <button id="panel-close">✕</button>
    <div id="panel-type-badge" class="lang">Language</div>
    <div id="panel-name">—</div>
    <div id="panel-native">—</div>
    <div id="panel-subtitle">—</div>
  </div>
  <div id="panel-body"></div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-title">Language Families</div>
  <div id="legend-items"></div>
  <div id="dialect-toggle">
    <span id="dialect-toggle-label">Show Dialects</span>
    <div class="toggle-switch on" id="toggle-sw"><div class="toggle-knob"></div></div>
  </div>
</div>

<!-- CREDIT BADGE -->
<div id="credit-badge">
  <div class="credit-by">Developed by</div>
  <div class="credit-name">Muhammad Shoaib Tahir</div>
</div>

<!-- TOOLTIP -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-native" id="tt-native"></div>
  <div class="tt-sub" id="tt-sub"></div>
</div>

<!-- COMPASS -->
<div id="compass">

(function(){
  const pc = document.getElementById('particle-canvas');
  const ctx = pc.getContext('2d');
  let W, H;
  function resize(){ W = pc.width = window.innerWidth; H = pc.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const palettes = ['79,143,255','63,255,210','245,200,66','255,107,107','214,112,255'];
  const particles = Array.from({length:140}, () => {
    const p = { x:Math.random()*1920, y:Math.random()*1080, vx:(Math.random()-0.5)*0.18, vy:-Math.random()*0.28-0.04, r:Math.random()*1.4+0.3, alpha:Math.random()*0.45+0.08, col:palettes[Math.floor(Math.random()*palettes.length)], life:0, maxLife:Math.random()*500+200 };
    p.life = Math.random()*p.maxLife; return p;
  });
  function tick(){
    ctx.clearRect(0,0,W,H);
    particles.forEach((p,i)=>{
      p.life++;
      if(p.life>p.maxLife){ Object.assign(p, { x:Math.random()*W, y:H+5, life:0, maxLife:Math.random()*500+200, col:palettes[Math.floor(Math.random()*palettes.length)] }); return; }
      const a = p.alpha * Math.sin(p.life/p.maxLife*Math.PI);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.col},${a})`; ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

let scene, camera, renderer, raycaster, mouse;
let controls = { isDown:false, lastX:0, lastY:0, theta:0.4, phi:Math.PI/3, radius:18, targetX:0, targetY:0, targetZ:0 };
const langObjects = new Map();
let dialectsVisible = true;
let currentMode = 'city';
let animationTick = 0;
let isDragging = false;
const floatingOrbs = [];

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05080f);
  scene.fog = new THREE.FogExp2(0x080c18, 0.036);

  camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.1, 200);
  updateCamPos();

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Lighting
  scene.add(new THREE.AmbientLight(0x0d1a3a, 2.0));
  const sun = new THREE.DirectionalLight(0x4488ff, 1.0);
  sun.position.set(8, 15, 10); sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left=-20;sun.shadow.camera.right=20;
  sun.shadow.camera.top=20;sun.shadow.camera.bottom=-20;
  scene.add(sun);
  const fl1 = new THREE.PointLight(0xf5c842, 0.55, 38); fl1.position.set(-6,6,-6); scene.add(fl1);
  const fl2 = new THREE.PointLight(0x3fffd2, 0.32, 28); fl2.position.set(6,4,-8); scene.add(fl2);

  // Ground
  const gnd = new THREE.Mesh(
    new THREE.PlaneGeometry(80,80,60,60),
    new THREE.MeshStandardMaterial({ color:0x060b18, roughness:0.95, metalness:0.04 })
  );
  gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true; scene.add(gnd);
  scene.add(new THREE.GridHelper(80,40,0x0d1a35,0x0a1428));

  // Stars
  const sGeo = new THREE.BufferGeometry();
  const sPos=[], sCol=[];
  const sPals=[[0.6,0.8,1],[1,0.9,0.6],[0.8,0.6,1],[0.5,1,0.85]];
  for(let i=0;i<3000;i++){
    sPos.push((Math.random()-.5)*160, Math.random()*75+8, (Math.random()-.5)*160);
    const c=sPals[i%sPals.length]; sCol.push(...c);
  }
  sGeo.setAttribute('position',new THREE.Float32BufferAttribute(sPos,3));
  sGeo.setAttribute('color',new THREE.Float32BufferAttribute(sCol,3));
  scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({size:0.07,vertexColors:true,transparent:true,opacity:0.9})));

  // Floating orbs
  const orbCols=[0x4f8fff,0xf5c842,0x3fffd2,0xff6b6b,0xd670ff,0xff9950,0x64c864,0xa0c4ff];
  for(let i=0;i<10;i++){
    const c=orbCols[i%orbCols.length];
    const oMesh=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:0.55}));
    const angle=(i/10)*Math.PI*2;
    const r=8+Math.random()*3;
    oMesh.position.set(Math.cos(angle)*r, 2.5+Math.random()*4.5, Math.sin(angle)*r);
    oMesh.userData={phase:angle,speed:0.35+Math.random()*0.25,radius:r,baseY:oMesh.position.y};
    scene.add(oMesh);
    const oLight=new THREE.PointLight(c,0.35,7); oLight.position.copy(oMesh.position); scene.add(oLight);
    floatingOrbs.push({orb:oMesh,light:oLight,mat:oMesh.material});
  }

  // Decorative ground ring
  const drMesh=new THREE.Mesh(new THREE.RingGeometry(9,9.5,64),new THREE.MeshBasicMaterial({color:0x1a2a55,transparent:true,opacity:0.4,side:THREE.DoubleSide}));
  drMesh.rotation.x=-Math.PI/2; drMesh.position.y=0.02; scene.add(drMesh);

  buildLanguages();

  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onMouseClick);
  renderer.domElement.addEventListener('mousedown', e=>{controls.isDown=true;controls.lastX=e.clientX;controls.lastY=e.clientY;isDragging=false;});
  renderer.domElement.addEventListener('mouseup', ()=>{controls.isDown=false;});
  renderer.domElement.addEventListener('wheel', onWheel, {passive:true});
  animate();
}

function getColor(lang){ return (FAMILIES[lang.family]||{}).color||0x888888; }

function buildLanguages(){
  LANGUAGES.forEach(lang=>{
    const col=getColor(lang);
    const hc=new THREE.Color(col);

    // Main building
    const geo=new THREE.BoxGeometry(0.44,lang.height,0.44);
    const mat=new THREE.MeshStandardMaterial({color:hc,emissive:hc,emissiveIntensity:0.28,roughness:0.35,metalness:0.65,transparent:true,opacity:1});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(lang.gx,lang.height/2,lang.gz);
    mesh.castShadow=true; mesh.receiveShadow=true;
    mesh.userData={type:'language',id:lang.id};
    scene.add(mesh);

    // Edges
    const eGeo=new THREE.EdgesGeometry(geo);
    const eMat=new THREE.LineBasicMaterial({color:hc,transparent:true,opacity:0.5});
    const edges=new THREE.LineSegments(eGeo,eMat);
    edges.position.copy(mesh.position); scene.add(edges);

    // Ground ring
    const rMat=new THREE.MeshBasicMaterial({color:hc,transparent:true,opacity:0.25,side:THREE.DoubleSide});
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.55,0.74,32),rMat);
    ring.rotation.x=-Math.PI/2; ring.position.set(lang.gx,0.015,lang.gz); scene.add(ring);

    // Pulse ring
    const prMat=new THREE.MeshBasicMaterial({color:hc,transparent:true,opacity:0.1,side:THREE.DoubleSide});
    const pRing=new THREE.Mesh(new THREE.RingGeometry(0.74,0.9,32),prMat);
    pRing.rotation.x=-Math.PI/2; pRing.position.set(lang.gx,0.016,lang.gz); scene.add(pRing);

    // Top cap
    const capMat=new THREE.MeshBasicMaterial({color:hc,transparent:true,opacity:0.9});
    const cap=new THREE.Mesh(new THREE.BoxGeometry(0.46,0.06,0.46),capMat);
    cap.position.set(lang.gx,lang.height+0.03,lang.gz); scene.add(cap);

    // Beacon beam
    const beamMat=new THREE.MeshBasicMaterial({color:hc,transparent:true,opacity:0.1,side:THREE.DoubleSide});
    const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.014,0.1,4,8,1,true),beamMat);
    beam.position.set(lang.gx,lang.height+2,lang.gz); scene.add(beam);

    // Label
    const sprite=makeTextSprite(lang.name,{color:'#'+hc.getHexString(),size:36});
    sprite.position.set(lang.gx,lang.height+0.72,lang.gz); scene.add(sprite);

    // Dialects
    const dialectMeshes=[];
    lang.dialects.forEach((d,di)=>{
      const dc=hc.clone().lerp(new THREE.Color(0xffffff),0.38);
      const dh=0.55+(di%3)*0.14;
      const dGeo=new THREE.BoxGeometry(0.16,dh,0.16);
      const dMat=new THREE.MeshStandardMaterial({color:dc,emissive:dc,emissiveIntensity:0.45,roughness:0.4,metalness:0.6,transparent:true,opacity:0.88});
      const dx=lang.gx+d.gx_offset, dz=lang.gz+d.gz_offset;
      const dMesh=new THREE.Mesh(dGeo,dMat);
      dMesh.position.set(dx,dh/2,dz);
      dMesh.castShadow=true;
      dMesh.userData={type:'dialect',id:d.id,parentId:lang.id};
      scene.add(dMesh);

      const deGeo=new THREE.EdgesGeometry(dGeo);
      const dEdge=new THREE.LineSegments(deGeo,new THREE.LineBasicMaterial({color:dc,transparent:true,opacity:0.55}));
      dEdge.position.copy(dMesh.position); scene.add(dEdge);

      const lGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(lang.gx,lang.height*.35,lang.gz),new THREE.Vector3(dx,dh,dz)]);
      const lMat=new THREE.LineBasicMaterial({color:dc,transparent:true,opacity:0.26});
      const line=new THREE.Line(lGeo,lMat); scene.add(line);

      const glowMat=new THREE.MeshBasicMaterial({color:dc,transparent:true,opacity:0.72});
      const glow=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8),glowMat);
      glow.position.set(dx,dh+0.1,dz); scene.add(glow);

      const drMat2=new THREE.MeshBasicMaterial({color:dc,transparent:true,opacity:0.18,side:THREE.DoubleSide});
      const dr=new THREE.Mesh(new THREE.RingGeometry(0.12,0.18,16),drMat2);
      dr.rotation.x=-Math.PI/2; dr.position.set(dx,0.01,dz); scene.add(dr);

      dialectMeshes.push({mesh:dMesh,dEdge,line,glow,dr,lMat,glowMat,drMat2,data:d,dh,baseDh:dh/2});
    });

    langObjects.set(lang.id,{mesh,mat,edges,eMat,ring,rMat,pRing,prMat,cap,capMat,beam,beamMat,sprite,dialects:dialectMeshes,data:lang,hc});
  });
}

function makeTextSprite(text,{color='#fff',size=32}={}){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,256,64);
  ctx.font=`bold ${size}px "Space Mono",monospace`;
  ctx.fillStyle=color; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=color; ctx.shadowBlur=14;
  ctx.fillText(text,128,32);
  const tex=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
  const s=new THREE.Sprite(mat); s.scale.set(2.1,.52,1);
  return s;
}

//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  animationTick += 0.016;
  const t = animationTick;

  // Floating orbs
  floatingOrbs.forEach(({orb,light,mat})=>{
    const ud=orb.userData;
    const a=ud.phase+t*ud.speed*0.28;
    orb.position.set(Math.cos(a)*ud.radius, ud.baseY+Math.sin(t*.75+ud.phase)*.9, Math.sin(a)*ud.radius);
    light.position.copy(orb.position);
    const p=Math.sin(t*1.3+ud.phase)*.5+.5;
    mat.opacity=.35+p*.32; light.intensity=.18+p*.32;
  });

  // Buildings & dialects
  langObjects.forEach((obj)=>{
    const ph=obj.data.gx*.5+obj.data.gz*.3;
    // Sway
    obj.mesh.rotation.z=Math.sin(t*.32+ph)*.0025;
    obj.edges.rotation.z=obj.mesh.rotation.z; obj.edges.position.copy(obj.mesh.position);
    // Beam
    obj.beamMat.opacity=.05+Math.sin(t*1.9+ph)*.08;
    obj.beam.rotation.y=t*.55+ph;
    // Cap
    obj.capMat.opacity=.65+Math.sin(t*2.1+ph)*.28;
    // Rings
    obj.rMat.opacity=.14+Math.sin(t*.85+ph)*.1;
    obj.prMat.opacity=.04+Math.sin(t*.65+ph+1)*.07;
    // Breathe emissive
    obj.mat.emissiveIntensity=.2+Math.sin(t*.55+ph)*.1;

    // Dialects
    obj.dialects.forEach((d,di)=>{
      const dp=di*1.35+ph;
      const p=Math.sin(t*1.55+dp)*.5+.5;
      d.mesh.material.emissiveIntensity=.28+p*.38;
      d.glowMat.opacity=.42+p*.5;
      d.drMat2.opacity=.1+p*.14;
      d.lMat.opacity=.18+Math.sin(t*1.1+dp)*.12;
      // Float
      const fy=d.baseDh+Math.sin(t*.88+dp)*.065;
      d.mesh.position.y=fy;
      d.dEdge.position.y=fy;
      d.glow.position.y=d.dh+.1+Math.sin(t*.88+dp)*.065;
      // Glow scale
      const gs=1+p*.32;
      d.glow.scale.set(gs,gs,gs);
    });
  });

  updateCamPos();
  renderer.render(scene,camera);
}

function updateCamPos(){
  const {theta,phi,radius,targetX,targetY,targetZ}=controls;
  camera.position.set(
    targetX+radius*Math.sin(phi)*Math.sin(theta),
    targetY+radius*Math.cos(phi),
    targetZ+radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(targetX,targetY,targetZ);
}

// ═══════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════
function onMouseMove(e){
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  if(controls.isDown){
    const dx=e.clientX-controls.lastX, dy=e.clientY-controls.lastY;
    if(Math.abs(dx)>2||Math.abs(dy)>2) isDragging=true;
    controls.theta-=dx*.007;
    controls.phi=Math.max(.18,Math.min(Math.PI/2.05,controls.phi+dy*.005));
    controls.lastX=e.clientX; controls.lastY=e.clientY;
    return;
  }
  raycaster.setFromCamera(mouse,camera);
  const targets=[];
  langObjects.forEach(obj=>{targets.push(obj.mesh);obj.dialects.forEach(d=>targets.push(d.mesh));});
  const hits=raycaster.intersectObjects(targets);
  const tt=document.getElementById('tooltip');
  if(hits.length>0){
    document.body.style.cursor='pointer';
    const ud=hits[0].object.userData;
    if(ud.type==='language'){
      const lang=LANGUAGES.find(l=>l.id===ud.id);
      if(lang){ showTooltip(e,lang.name,lang.native,`${(FAMILIES[lang.family]||{}).label||lang.family} · ${lang.speakers}`); highlightLang(ud.id); }
    } else if(ud.type==='dialect'){
      const lang=LANGUAGES.find(l=>l.id===ud.parentId);
      const d=lang?.dialects.find(x=>x.id===ud.id);
      if(d) showTooltip(e,d.name,d.native,`Dialect of ${lang.name} · ${d.region}`);
    }
  } else {
    document.body.style.cursor='';
    tt.style.display='none';
    clearHighlights();
  }
}

function onMouseClick(e){
  if(isDragging){isDragging=false;return;}
  raycaster.setFromCamera(mouse,camera);
  const targets=[];
  langObjects.forEach(obj=>{targets.push(obj.mesh);obj.dialects.forEach(d=>targets.push(d.mesh));});
  const hits=raycaster.intersectObjects(targets);
  if(!hits.length) return;
  const ud=hits[0].object.userData;
  if(ud.type==='language'){openLangPanel(ud.id);focusOn(hits[0].object.position);}
  else if(ud.type==='dialect'){openDialectPanel(ud.parentId,ud.id);focusOn(hits[0].object.position,.42);}
}

function onWheel(e){ controls.radius=Math.max(4,Math.min(42,controls.radius+e.deltaY*.017)); }
function onResize(){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); }
function focusOn(pos,a=.26){ controls.targetX+=(pos.x-controls.targetX)*a; controls.targetZ+=(pos.z-controls.targetZ)*a; }

// ═══════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════
function showTooltip(e,name,native,sub){
  const t=document.getElementById('tooltip');
  document.getElementById('tt-name').textContent=name;
  document.getElementById('tt-native').textContent=native;
  document.getElementById('tt-sub').textContent=sub;
  t.style.display='block';
  t.style.left=Math.min(e.clientX+18,window.innerWidth-230)+'px';
  t.style.top=Math.max(8,Math.min(e.clientY-14,window.innerHeight-110))+'px';
}

// ═══════════════════════════════════════════════════════════
//  HIGHLIGHTS
// ═══════════════════════════════════════════════════════════
function highlightLang(id){
  langObjects.forEach((obj,oid)=>{
    const a=oid===id;
    obj.mat.emissiveIntensity=a?.75:.07;
    obj.mat.opacity=a?1:.42;
    obj.dialects.forEach(d=>{d.mesh.material.opacity=a?1:.22;d.lMat.opacity=a?.72:.05;d.glowMat.opacity=a?1:.14;});
  });
}
function clearHighlights(){
  langObjects.forEach(obj=>{
    obj.mat.emissiveIntensity=.25; obj.mat.opacity=1;
    obj.dialects.forEach(d=>{d.mesh.material.opacity=dialectsVisible?.88:0;d.lMat.opacity=dialectsVisible?.26:0;d.glowMat.opacity=dialectsVisible?.72:0;});
  });
}

// ═══════════════════════════════════════════════════════════
//  PANELS
// ═══════════════════════════════════════════════════════════
function openLangPanel(langId){
  const lang=LANGUAGES.find(l=>l.id===langId); if(!lang) return;
  document.getElementById('panel-type-badge').className='lang'; document.getElementById('panel-type-badge').textContent='Language';
  document.getElementById('panel-name').textContent=lang.name;
  document.getElementById('panel-native').textContent=lang.native;
  document.getElementById('panel-subtitle').textContent=`${(FAMILIES[lang.family]||{}).label||lang.family} · ${lang.region}`;
  const body=document.getElementById('panel-body'); body.innerHTML='';

  const s1=mkSec('Overview');
  [['Speakers',lang.speakers],['Script',lang.script],['Region',lang.region],['Status',`<span class="status-pill status-${lang.status}">${lang.status.toUpperCase()}</span>`],['Family',(FAMILIES[lang.family]||{}).label||lang.family]].forEach(([l,v])=>s1.appendChild(mkRow(l,v)));
  body.appendChild(s1);

  const s2=mkSec('About'); const p=document.createElement('p');
  p.style.cssText='font-size:.61rem;color:var(--text-dim);line-height:1.75;'; p.textContent=lang.description;
  s2.appendChild(p); body.appendChild(s2);

  const s3=mkSec('Common Phrases');
  Object.entries(lang.phrases).forEach(([k,v])=>{ if(k.endsWith('_r'))return; const pb=document.createElement('div'); pb.className='phrase-block'; pb.innerHTML=`<div class="phrase-roman">${cap1(k)}: <b>${v}</b></div><div class="phrase-script">${lang.phrases[k+'_r']||''}</div>`; s3.appendChild(pb); });
  body.appendChild(s3);

  const s4=mkSec(`Dialects (${lang.dialects.length})`); const wrap=document.createElement('div');
  lang.dialects.forEach(d=>{ const tag=document.createElement('span'); tag.className='dialect-tag'; tag.textContent=d.name; tag.title=d.region; tag.onclick=()=>openDialectPanel(lang.id,d.id); wrap.appendChild(tag); });
  s4.appendChild(wrap); body.appendChild(s4);

  document.getElementById('info-panel').classList.add('open');
  document.getElementById('compass').classList.add('panel-open');
}

function openDialectPanel(langId,dialectId){
  const lang=LANGUAGES.find(l=>l.id===langId);
  const d=lang?.dialects.find(x=>x.id===dialectId);
  if(!lang||!d) return;
  document.getElementById('panel-type-badge').className='dialect'; document.getElementById('panel-type-badge').textContent='Dialect';
  document.getElementById('panel-name').textContent=d.name;
  document.getElementById('panel-native').textContent=d.native;
  document.getElementById('panel-subtitle').textContent=`Dialect of ${lang.name} · ${d.region}`;
  const body=document.getElementById('panel-body'); body.innerHTML='';

  const s1=mkSec('Overview');
  [['Parent Language',lang.name],['Region',d.region],['Status',`<span class="status-pill status-${d.status}">${d.status.toUpperCase()}</span>`]].forEach(([l,v])=>s1.appendChild(mkRow(l,v)));
  body.appendChild(s1);

  if(d.notes){ const s2=mkSec('Variation Notes'); const p=document.createElement('p'); p.style.cssText='font-size:.61rem;color:var(--text-dim);line-height:1.75;'; p.textContent=d.notes; s2.appendChild(p); body.appendChild(s2); }

  const s3=mkSec('Dialect Phrases');
  Object.entries(d.phrases).forEach(([k,v])=>{ if(k.endsWith('_r'))return; const pb=document.createElement('div'); pb.className='phrase-block'; pb.innerHTML=`<div class="phrase-roman">${cap1(k)}: <b>${v}</b></div><div class="phrase-script">${d.phrases[k+'_r']||''}</div>`; s3.appendChild(pb); });
  body.appendChild(s3);

  const s4=mkSec('Parent Language'); const bt=document.createElement('span'); bt.className='dialect-tag'; bt.textContent=`← ${lang.name}`; bt.onclick=()=>openLangPanel(lang.id); s4.appendChild(bt); body.appendChild(s4);

  document.getElementById('info-panel').classList.add('open');
  document.getElementById('compass').classList.add('panel-open');
}

function mkSec(title){ const s=document.createElement('div'); s.className='panel-section'; const t=document.createElement('div'); t.className='panel-section-title'; t.textContent=title; s.appendChild(t); return s; }
function mkRow(label,value){ const r=document.createElement('div'); r.className='stat-row'; r.innerHTML=`<span>${label}</span><span>${value}</span>`; return r; }
function cap1(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

// ═══════════════════════════════════════════════════════════
//  LEGEND
// ═══════════════════════════════════════════════════════════
function buildLegend(){
  const c=document.getElementById('legend-items');
  Object.entries(FAMILIES).forEach(([key,fam])=>{
    const count=LANGUAGES.filter(l=>l.family===key).length; if(!count) return;
    const hex='#'+new THREE.Color(fam.color).getHexString();
    const row=document.createElement('div'); row.className='legend-row';
    row.innerHTML=`<div class="legend-swatch" style="background:${hex};box-shadow:0 0 8px ${hex}55;"></div><span class="legend-label">${fam.label}</span><span class="legend-count">${count}</span>`;
    c.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════
//  VIEW MODES
// ═══════════════════════════════════════════════════════════
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  langObjects.forEach(obj=>{
    const lang=obj.data;
    if(mode==='city'){ obj.mat.opacity=1; obj.mat.color.set(getColor(lang)); obj.mat.emissive.set(getColor(lang)); obj.mat.emissiveIntensity=.25; obj.dialects.forEach(d=>{d.mesh.visible=dialectsVisible;d.line.visible=dialectsVisible;d.glow.visible=dialectsVisible;d.mesh.material.opacity=.88;d.lMat.opacity=.26;}); }
    else if(mode==='family'){ obj.mat.opacity=1; obj.mat.color.set(getColor(lang)); obj.mat.emissive.set(getColor(lang)); obj.mat.emissiveIntensity=.48; obj.dialects.forEach(d=>{d.mesh.visible=false;d.line.visible=false;d.glow.visible=false;}); }
    else if(mode==='dialect'){ obj.mat.opacity=.32; obj.mat.emissiveIntensity=.07; obj.dialects.forEach(d=>{d.mesh.visible=true;d.line.visible=true;d.glow.visible=true;d.mesh.material.opacity=1;d.lMat.opacity=.65;}); }
    else if(mode==='status'){ const sc=STATUS_COLORS[lang.status]||0x888888; obj.mat.color.set(sc); obj.mat.emissive.set(sc); obj.mat.emissiveIntensity=.36; obj.mat.opacity=1; obj.dialects.forEach(d=>{const dc=STATUS_COLORS[d.data.status]||0x888888;d.mesh.material.color.set(dc);d.mesh.material.emissive.set(dc);d.mesh.visible=dialectsVisible;d.line.visible=dialectsVisible;d.glow.visible=dialectsVisible;}); }
  });
}

// ═══════════════════════════════════════════════════════════
//  TOGGLE DIALECTS
// ═══════════════════════════════════════════════════════════
function toggleDialects(){
  dialectsVisible=!dialectsVisible;
  document.getElementById('toggle-sw').classList.toggle('on',dialectsVisible);
  langObjects.forEach(obj=>obj.dialects.forEach(d=>{d.mesh.visible=dialectsVisible;d.line.visible=dialectsVisible;d.glow.visible=dialectsVisible;d.dr.visible=dialectsVisible;}));
}

// ═══════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════
function doSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase(); if(!q) return;
  for(const lang of LANGUAGES){
    if(lang.name.toLowerCase().includes(q)||lang.id.includes(q)||lang.native.includes(q)){ openLangPanel(lang.id); const obj=langObjects.get(lang.id); if(obj) focusOn(obj.mesh.position,.85); return; }
    for(const d of lang.dialects){
      if(d.name.toLowerCase().includes(q)||d.native.includes(q)||d.id.includes(q)){ openDialectPanel(lang.id,d.id); const obj=langObjects.get(lang.id); if(obj){const dm=obj.dialects.find(x=>x.data.id===d.id);if(dm)focusOn(dm.mesh.position,.85);} return; }
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  COMPASS NEEDLE
// ═══════════════════════════════════════════════════════════
setInterval(()=>{ const n=document.getElementById('compass-needle'); if(n) n.style.transform=`rotate(${controls.theta*57.3}deg)`; },100);

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', ()=>{
  let prog=0;
  const fill=document.getElementById('load-fill');
  const dot=document.getElementById('load-dot');
  const iv=setInterval(()=>{
    prog+=Math.random()*14+3;
    const p=Math.min(prog,95);
    fill.style.width=p+'%'; dot.style.left=p+'%';
    if(prog>=95) clearInterval(iv);
  },90);

  setTimeout(()=>{
    initThree(); buildLegend();
    fill.style.width='100%'; dot.style.left='100%';
    setTimeout(()=>document.getElementById('loading').classList.add('done'), 500);

    document.querySelectorAll('.mode-btn').forEach(btn=>btn.addEventListener('click',()=>setMode(btn.dataset.mode)));
    document.getElementById('panel-close').addEventListener('click',()=>{ document.getElementById('info-panel').classList.remove('open'); document.getElementById('compass').classList.remove('panel-open'); });
    document.getElementById('dialect-toggle').addEventListener('click', toggleDialects);
    document.getElementById('search-btn').addEventListener('click', doSearch);
    document.getElementById('search-input').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
  }, 750);
});
</script>
